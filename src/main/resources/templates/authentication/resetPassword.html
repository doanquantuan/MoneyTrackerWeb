<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <!-- bootstrap css link -->
    <link rel="stylesheet" th:href="@{/lib/bootstrap_5/bootstrap.min.css}">
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" th:href="@{/lib/fontawesome/css/all.min.css}">
    <!-- main css -->
    <link rel="stylesheet" th:href="@{/assets/css/global.css}">
    <link rel="stylesheet" th:href="@{/assets/css/style.css}">
    <!-- responsive css -->
    <link rel="stylesheet" th:href="@{/assets/css/responsive.css}">
</head>

<body class="d2c_theme_light">
    <section class="d2c_login_system d-flex align-items-center">
        <div class="container">
            <div class="row">
                <div class="col-md-8 offset-md-2 col-lg-6 offset-lg-3 col-xxl-4 offset-xxl-4">
                    <div class="d2c_login_wrapper">
                        <div class="text-center mb-4">
                            <h4 class="text-capitalize">Reset password</h4>
                            <p class="text-muted">Enter your new password and confirm new password.</p>
                        </div>
                        <form class="form-vaidation" novalidate th:action="@{/resetPassword}" method="post">
                            <div class="mb-3">
                                <label class="form-label">New Password</label>
                                <div class="input-group">
                                    <input type="password" id="password" name="password" class="form-control border-end-0" placeholder="Enter password" aria-describedby="button-addon2" required>
                                    <button class="btn ps-0 border-start-0 m-0" type="button" onclick="togglePassword('password', 'icon1')"><i id="icon1" class="far fa-eye-slash"></i></button>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Confirm Password</label>
                                <div class="input-group">
                                    <input type="password" id="confirmPassword" name="confirmPassword" class="form-control border-end-0" placeholder="Enter password" aria-describedby="button-addon2" required>
                                    <button class="btn ps-0 border-start-0 m-0" type="button" onclick="togglePassword('confirmPassword', 'icon2')"><i id="icon2" class="far fa-eye-slash"></i></button>
                                </div>
                            </div>
                            <div class="mb-3">
                                <button type="submit" class="btn btn-primary w-100 text-capitalize">Submit</button>
                            </div>
                            <a th:href="@{/login}" class="d2c_link_btn btn w-100 d-flex align-items-center justify-content-center text-capitalize">
                                Back To sign in
                            </a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Initial  Javascript -->
    <script th:src="@{/lib/jQuery/jquery-3.5.1.min.js}"></script>
    <script th:src="@{/lib/bootstrap_5/bootstrap.bundle.min.js}"></script>

    <!-- custom js -->
    <script th:src="@{/assets/js/main.js}"></script>
    
    <script>
	    function togglePassword(inputId, iconId) {
	        const input = document.getElementById(inputId);
	        const icon = document.getElementById(iconId);
	
	        if (input.type === "password") {
	            input.type = "text"; 
	            icon.classList.remove("fa-eye-slash");
	            icon.classList.add("fa-eye");
	        } else {
	            input.type = "password"; 
	            icon.classList.remove("fa-eye");
	            icon.classList.add("fa-eye-slash");
	        }
	    }
    </script>
</body>
</html>
