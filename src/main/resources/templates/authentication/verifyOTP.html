<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP</title>
    <!-- bootstrap css link -->
    <link rel="stylesheet" th:href="@{lib/bootstrap_5/bootstrap.min.css}">
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" th:href="@{/lib/fontawesome/css/all.min.css}">
    <!-- main css -->
    <link rel="stylesheet" th:href="@{/assets/css/global.css}">
    <link rel="stylesheet" th:href="@{/assets/css/style.css}">
    <!-- responsive css -->
    <link rel="stylesheet" th:href="@{/assets/css/responsive.css}">
</head>

<body>

<body class="d2c_theme_light">
    <section class="d2c_login_system d-flex align-items-center">
	    <div class="container">
	        <div class="row">
	            <div class="col-md-8 offset-md-2 col-lg-6 offset-lg-3 col-xxl-4 offset-xxl-4">
	                <div class="d2c_login_wrapper">
	                    
	                    <div class="text-center mb-4">
	                        <h4 class="text-capitalize">Verify OTP</h4>
	                        <p class="text-muted">
	                            The OTP is a 6-digit code sent to your registered email address
	                        </p>
	                    </div>
	
	                    <!-- VERIFY OTP FORM -->
	                    <form th:action="@{/verifyOTP}" method="post" novalidate>
	
	                        <div class="mb-3">
	                            <label class="form-label">Your OTP</label>
	                            <input type="text"
	                                   name="otp"
	                                   class="form-control"
	                                   placeholder="Enter OTP"
	                                   maxlength="6"
	                                   required>
	                        </div>
	                        <div th:if="${error}" class="alert alert-danger">
						        <span th:text="${error}"></span>
						    </div>
	
	                        <div class="mb-3">
	                            <button type="submit"
	                                    class="btn btn-primary w-100 text-capitalize">
	                                Submit
	                            </button>
	                        </div>
	                    </form>
	
	                    <!-- RESEND OTP FORM -->
	                    <form th:action="@{/resend-otp}" method="post">
	                        <button type="submit"
	                                class="d2c_link_btn btn w-100 d-flex align-items-center justify-content-center text-capitalize mb-2">
	                            Resend OTP
	                        </button>
	                    </form>
	
	                    <!-- BACK TO LOGIN -->
	                    <a th:href="@{/login}"
	                       class="d2c_link_btn btn w-100 d-flex align-items-center justify-content-center text-capitalize">
	                        Back to Sign In
	                    </a>
	
	                </div>
	            </div>
	        </div>
	    </div>
	</section>

    <!-- Initial  Javascript -->
    <script th:src="@{/lib/jQuery/jquery-3.5.1.min.js}"></script>
    <script th:src="@{/lib/bootstrap_5/bootstrap.bundle.min.js}"></script>

    <!-- custom js -->
    <script th:src="@{/assets/js/main.js}"></script>
</body>
</html>
