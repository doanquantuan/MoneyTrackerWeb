<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <!-- bootstrap css link -->
    <link rel="stylesheet" th:href="@{lib/bootstrap_5/bootstrap.min.css}">
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" th:href="@{/lib/fontawesome/css/all.min.css}">
    <!-- main css -->
    <link rel="stylesheet" th:href="@{/assets/css/global.css}">
    <link rel="stylesheet" th:href="@{/assets/css/style.css}">
    <!-- responsive css -->
    <link rel="stylesheet" th:href="@{/assets/css/responsive.css}">
</head>

<body class="d2c_theme_light">
    <!-- Main Body-->
    <section class="d2c_login_system d-flex align-items-center">
        <div class="container">
            <div class="row">
                <div class="col-md-8 offset-md-2 col-lg-6 offset-lg-3 col-xxl-4 offset-xxl-4">
                    <div class="d2c_login_wrapper">
                        <div class="text-center mb-4">
                            <h4 class="text-capitalize">Welcome Findeshdev</h4>
                            <p class="text-muted">Don't have an account? <a th:href="@{/register}" class="text-capitalize text-primary text-decoration-none d2c_link">Sing up here</a>
                            </p>
                        </div>
                        <form class="form-validation" novalidate>
                            <div class="mb-3">
                                <label class="form-label">Your Email</label>
                                <input type="email" name="email" class="form-control" placeholder="Enter your mail" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <div class="input-group">
                                    <input type="password" id="password" name="password" class="form-control border-end-0" placeholder="Enter password" aria-describedby="button-addon2" required>
                                    <button class="btn ps-0 border-start-0 m-0" type="button" onclick="togglePassword('password', 'icon')"><i id="icon" class="far fa-eye-slash"></i></button>
                                </div>
                            </div>
                            
                            <!-- Alert placeholder for AJAX feedback -->
                            <div id="alertMessage" class="alert" style="display:none; padding: 12px; margin-bottom: 15px; border-radius: 8px; font-weight: 500;"></div>

                            <div class="row mb-3">
                                <div class="col">
                                    <div class="form-check">
                                        <input type="checkbox" class="form-check-input" id="exampleCheck1">
                                        <label class="form-check-label text-muted" for="exampleCheck1">Remember Me</label>
                                    </div>
                                </div>
                                <div class="col text-end ps-0">
                                    <a th:href="@{/forgetPassword}" class="d2c_link text-primary text-capitalize">Forget Password?</a>
                                </div>
                            </div>
                            <div class="mb-3">
                                <button type="submit" class="btn btn-primary w-100 text-capitalize">Sign In</button>
                            </div>
                        </form>
                        <button class="d2c_link_btn btn w-100 d-flex align-items-center justify-content-center text-capitalize">
                            <img th:src="@{/assets/images/google.png}" class="me-2" alt="google image">
                            Sign in With Google
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- End:Main Body -->

    <!-- Initial  Javascript -->
    <script th:src="@{/lib/jQuery/jquery-3.5.1.min.js}"></script>
	<script th:src="@{/lib/bootstrap_5/bootstrap.bundle.min.js}"></script>
    <!-- custom js -->
	<script th:src="@{/assets/js/main.js}"></script>
	
	<script>
	    function togglePassword(inputId, iconId) {
	        const input = document.getElementById(inputId);
	        const icon = document.getElementById(iconId);
	
	        if (input.type === "password") {
	            input.type = "text"; 
	            icon.classList.remove("fa-eye-slash");
	            icon.classList.add("fa-eye");
	        } else {
	            input.type = "password"; 
	            icon.classList.remove("fa-eye");
	            icon.classList.add("fa-eye-slash");
	        }
	    }

        $(document).ready(function() {
            $('form').on('submit', function(e) {
                e.preventDefault();
                
                const $form = $(this);
                const $alert = $('#alertMessage');
                const $btn = $form.find('button[type="submit"]');
                
                // Form validation
                if ($form[0].checkValidity() === false) {
                    e.stopPropagation();
                    $form.addClass('was-validated');
                    return;
                }
                
                const email = $('input[name="email"]').val();
                const password = $('#password').val();
                
                // Reset alert
                $alert.hide().removeClass('alert-danger alert-success');
                
                // Disable button and show spinner
                $btn.prop('disabled', true).html('<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Signing In...');
                
                $.ajax({
                    url: '/api/auth/login',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ email: email, password: password }),
                    success: function(response) {
                        // Store the token in cookie (valid for 1 day)
                        document.cookie = "auth_token=" + response.token + "; path=/; max-age=" + (24 * 60 * 60) + "; SameSite=Strict";
                        
                        $alert.addClass('alert-success')
                              .text("Đăng nhập thành công! Đang chuyển hướng...")
                              .fadeIn();
                              
                        setTimeout(function() {
                            window.location.href = '/';
                        }, 1000);
                    },
                    error: function(xhr) {
                        $btn.prop('disabled', false).text('Sign In');
                        let errMsg = "Tên đăng nhập hoặc mật khẩu không chính xác.";
                        if (xhr.status === 401 || xhr.status === 400) {
                            if (xhr.responseText) {
                                errMsg = xhr.responseText;
                            }
                        } else {
                            errMsg = "Lỗi kết nối máy chủ. Vui lòng thử lại sau!";
                        }
                        $alert.addClass('alert-danger')
                              .text(errMsg)
                              .fadeIn();
                    }
                });
            });
        });
    </script>
</body>
</html>
