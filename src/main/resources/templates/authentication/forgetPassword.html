<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forget Password</title>
    <!-- bootstrap css link -->
    <link rel="stylesheet" th:href="@{/lib/bootstrap_5/bootstrap.min.css}">
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" th:href="@{/lib/fontawesome/css/all.min.css}">
    <!-- main css -->
    <link rel="stylesheet" th:href="@{/assets/css/global.css}">
    <link rel="stylesheet" th:href="@{/assets/css/style.css}">
    <!-- responsive css -->
    <link rel="stylesheet" th:href="@{/assets/css/responsive.css}">
</head>

<body class="d2c_theme_light">
    <section class="d2c_login_system d-flex align-items-center">
        <div class="container">
            <div class="row">
                <div class="col-md-8 offset-md-2 col-lg-6 offset-lg-3 col-xxl-4 offset-xxl-4">
                    <div class="d2c_login_wrapper">
                        <div class="text-center mb-4">
                            <h4 class="text-capitalize">Forget password?</h4>
                            <p class="text-muted">Enter the email address & we'll send you instructions to reset your password.</p>
                        </div>
                        <form class="form-validation" novalidate>
                            <div class="mb-3">
                                <label class="form-label">Your Email</label>
                                <input type="email" name="email" class="form-control" placeholder="Enter your mail" required>
                            </div>
                            
                            <!-- Alert placeholder for AJAX feedback -->
                            <div id="alertMessage" class="alert" style="display:none; padding: 12px; margin-bottom: 15px; border-radius: 8px; font-weight: 500;"></div>

                            <div class="mb-3">
                                <button type="submit" class="btn btn-primary w-100 text-capitalize">Submit</button>
                            </div>
                            <a th:href="@{/login}" class="d2c_link_btn btn w-100 d-flex align-items-center justify-content-center text-capitalize">
                                Back To sign in
                            </a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Initial  Javascript -->
    <script th:src="@{/lib/jQuery/jquery-3.5.1.min.js}"></script>
    <script th:src="@{/lib/bootstrap_5/bootstrap.bundle.min.js}"></script>

    <!-- custom js -->
    <script th:src="@{/assets/js/main.js}"></script>

    <script>
        $(document).ready(function() {
            $('form').on('submit', function(e) {
                e.preventDefault();
                
                const $form = $(this);
                const $alert = $('#alertMessage');
                const $btn = $form.find('button[type="submit"]');
                
                // Form validation
                if ($form[0].checkValidity() === false) {
                    e.stopPropagation();
                    $form.addClass('was-validated');
                    return;
                }
                
                const email = $('input[name="email"]').val();
                
                // Reset alert
                $alert.hide().removeClass('alert-danger alert-success');
                
                // Disable button and show loading spinner
                $btn.prop('disabled', true).html('<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Sending OTP...');
                
                $.ajax({
                    url: '/api/auth/forget-password',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ email: email }),
                    success: function(response) {
                        // Store email in sessionStorage to pass along to next steps
                        sessionStorage.setItem('resetEmail', email);
                        
                        $alert.addClass('alert-success')
                              .text("Mã OTP đã được gửi thành công! Đang chuyển hướng xác thực...")
                              .fadeIn();
                              
                        setTimeout(function() {
                            window.location.href = '/verifyOTP';
                        }, 1500);
                    },
                    error: function(xhr) {
                        $btn.prop('disabled', false).text('Submit');
                        let errMsg = "Không thể gửi mã OTP. Vui lòng kiểm tra lại email!";
                        if (xhr.status === 400 || xhr.status === 500) {
                            try {
                                const errObj = JSON.parse(xhr.responseText);
                                if (errObj && errObj.message) {
                                    errMsg = errObj.message;
                                }
                            } catch(e) {
                                if (xhr.responseText) {
                                    errMsg = xhr.responseText;
                                }
                            }
                        }
                        $alert.addClass('alert-danger')
                              .text(errMsg)
                              .fadeIn();
                    }
                });
            });
        });
    </script>
</body>
</html>
