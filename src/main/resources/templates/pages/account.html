<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/sidebar}">

<head>
    <meta charset="UTF-8">
    <title>Money Tracker</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <!-- favicon -->
    <link rel="icon" th:href="@{/assets/images/logo/logo-sm.png}" sizes="16x16">

    <!-- bootstrap -->
    <link rel="stylesheet" th:href="@{/lib/bootstrap_5/bootstrap.min.css}">

    <!-- font awesome -->
    <link rel="stylesheet" th:href="@{/lib/fontawesome/css/all.min.css}">

    <!-- main css -->
    <link rel="stylesheet" th:href="@{/assets/css/global.css}">
    <link rel="stylesheet" th:href="@{/assets/css/style.css}">
    <link rel="stylesheet" th:href="@{/assets/css/responsive.css}">
</head>

<body>

<!-- ================= CONTENT ================= -->
<div layout:fragment="content">

    <!-- Title -->
    <h4 class="mb-4 text-capitalize">Tài khoản</h4>

    <!-- Add account -->
    <a th:href="@{/accounts/create}" class="btn btn-primary mb-4">
        <i class="fas fa-plus"></i> Thêm tài khoản
    </a>

    <div class="row">
        <div class="col-12">
            <div class="card d2c_projects_datatable">

                <div class="card-header">
                    <h6>Danh sách tài khoản của bạn</h6>
                </div>

                <div class="card-body">

                    <!-- ===== EMPTY STATE ===== -->
                    <div th:if="${#maps.isEmpty(accountsByType)}"
                         class="text-center text-muted py-5">
                        <i class="fas fa-wallet fa-3x mb-3"></i>
                        <p class="mb-3">Bạn chưa có tài khoản nào</p>
                        <a th:href="@{/accounts/create}" class="btn btn-primary">
                            <i class="fas fa-plus"></i> Thêm tài khoản đầu tiên
                        </a>
                    </div>

                    <!-- ===== ACCOUNT LIST ===== -->
                    <div th:if="${!#maps.isEmpty(accountsByType)}">

                        <div class="accordion" id="accountAccordion">

                            <div th:each="entry, iter : ${accountsByType}"
                                 class="accordion-item">

                                <!-- Header -->
                                <h2 class="accordion-header"
                                    th:id="'heading-' + ${iter.index}">
                                    <button class="accordion-button collapsed"
                                            type="button"
                                            data-bs-toggle="collapse"
                                            th:data-bs-target="'#collapse-' + ${iter.index}">

                                        <i class="fas fa-wallet me-2"></i>
                                        <span th:text="${entry.key}"></span>

                                        <span class="ms-auto text-muted"
                                              th:text="${#lists.size(entry.value)} + ' accounts'">
                                        </span>
                                    </button>
                                </h2>

                                <!-- Body -->
                                <div th:id="'collapse-' + ${iter.index}"
                                     class="accordion-collapse collapse"
                                     th:data-bs-parent="#accountAccordion">

                                    <div class="accordion-body p-0">
                                        <table class="table mb-0">
                                            <thead class="table-light">
                                            <tr>
                                                <th>Name</th>
                                                <th class="text-end">Balance</th>
                                            </tr>
                                            </thead>
                                            <tbody>
                                            <tr th:each="acc : ${entry.value}">
                                                <td th:text="${acc.accountName}"></td>
                                                <td class="text-end"
                                                    th:text="${#numbers.formatDecimal(acc.currentBalance, 0, 'COMMA', 0, 'POINT')}">
                                                </td>
                                            </tr>
                                            </tbody>
                                        </table>
                                    </div>

                                </div>
                            </div>

                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

</div>
<!-- ================= END CONTENT ================= -->

<!-- JS -->
<script th:src="@{/lib/jQuery/jquery-3.5.1.min.js}"></script>
<script th:src="@{/lib/bootstrap_5/bootstrap.bundle.min.js}"></script>
<script th:src="@{/assets/js/main.js}"></script>

</body>
</html>
