<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/sidebar}">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../assets/images/logo/logo-sm.png" type="image/gif" sizes="16x16">
    <title>Create Payments</title>
    <meta name="og:description" content="FinDeshY is a free financial Bootstrap dashboard template to manage your financial data easily. This free financial dashboard uses Bootstrap to provide a responsive and user-friendly interface. Whether you're a small business owner seeking insights into your company's financial health or an individual looking to simplify your personal finances, this free Bootstrap dashboard template has you covered.">
    <meta name="robots" content="index, follow">
    <meta name="og:title" property="og:title" content="FinDeshY - Free Financial Bootstrap Dashboard Template">
    <meta property="og:image" content="https://www.designtocodes.com/wp-content/uploads/2023/10/FinDeshY-Professional-Financial-Bootstrap-Dashboard-Template.jpg">
    <!-- bootstrap css link -->
    <link rel="stylesheet" href="../lib/bootstrap_5/bootstrap.min.css">
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="../lib/fontawesome/css/all.min.css">
    <!-- main css -->
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <!-- responsive css -->
    <link rel="stylesheet" href="../assets/css/responsive.css">
</head>

<body>

<!-- ================= CONTENT ================= -->
<div layout:fragment="content">

    <div class="d2c_wrapper">

            <!-- Title -->
            <h4 class="mb-4 text-capitalize">Tạo tài khoản</h4>
            <!-- End:Title -->

            <div class="card h-auto">
                <div class="card-body">
                    <form action="#">
                        <div class="row">
                            <div class="col-md-6 col-xl-4">
                                <div class="mb-4">
                                    <label for="Group" class="form-label">Loại tài khoản</label>
                                    <select id="Group" class="form-select form-control">
                                        <option selected>Group 1</option>
                                        <option>Group 2</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="col-md-6 col-xl-4">
                                <div class="mb-4">
                                    <label class="form-label">Tên tài khoản</label>
                                    <input type="text" class="form-control" placeholder="Nhập tên tài khoản" required>
                                </div>
                            </div>
                            
                            <div class="col-md-6 col-xl-4">
                                <div class="mb-4">
                                    <label class="form-label">Số dư</label>
                                    <input type="number" class="form-control" placeholder="Enter Amount" required>
                                </div>
                            </div>
                            <div class="col-md-6 col-xl-4">
                                <div class="mb-4">
                                    <label class="form-label">Đơn vị tiền tệ</label>
                                    <input type="date" class="form-control" required>
                                </div>
                            </div>
                            
                            <div>
                                <button class="btn btn-primary">Create Now</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        <!-- End:Main Body -->
    </div>

    <!-- Offcanvas Toggler -->
    <button class="d2c_offcanvas_toggle position-fixed top-50 start-0 translate-middle-y d-block d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#d2c_sidebar">
        <i class="far fa-hand-point-right"></i>
    </button>
    <!-- End:Offcanvas Toggler -->

    <!-- Initial  Javascript -->
    <script src="../lib/jQuery/jquery-3.5.1.min.js"></script>
    <script src="../lib/bootstrap_5/bootstrap.bundle.min.js"></script>

    <!-- custom js -->
    <script src="../assets/js/main.js"></script>
</body>
</html>
