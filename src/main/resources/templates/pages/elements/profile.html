<!DOCTYPE html>
<html lang="en"
	  xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/sidebar.html}">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money tracker</title>
    <!-- bootstrap css link -->
    <link rel="stylesheet" th:href="@{/lib/bootstrap_5/bootstrap.min.css}">
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" th:href="@{/lib/fontawesome/css/all.min.css}">
    <!-- main css -->
    <link rel="stylesheet" th:href="@{/assets/css/global.css}">
    <link rel="stylesheet" th:href="@{/assets/css/style.css}">

    <!-- responsive css -->
    <link rel="stylesheet" th:href="@{/assets/css/responsive.css}">
</head>

<body>
<main class="d2c_main p-4 ps-lg-3">
    <div layout:fragment="content">
    
        <!-- Title -->
        <h4 class="mb-4">Profile</h4>
        <!-- End:Title -->

        <div class="card h-auto">
            <div class="card-body d2c_user_profile_card">
                <div class="row">
                    <div class="col-xxl-3">
                        <div class="row">
                            <div class="col-lg-6 col-xxl-12">
                                <div class="card mb-4">
                                    <img src="../../assets/images/profile_info_bg.jpg" class="w-100 d2c_user_bg" alt="profile info bg">
                                    <div class="card-body d2c_user_info ">
                                        <img src="../../assets/images/profile_image_3.jpg" class="d2c_user_profile_img mb-3 rounded" alt="User image">
                                        <h5 class="mb-0 d2c_user_title" th:text="${fullName}"></h5>
                                        <p th:text="${user.email}"></p>
                                    </div>
                                </div>
                            </div>
                            <div class="col-12 col-lg-12">
                                <div class="card mb-4">
                                    <div class="card-body d2c_info_details">
                                        <!-- user details -->
                                        <h5 class="mb-4 d2c_user_title">Details</h5>
                                        <p>
                                            <i class="fas fa-envelope"></i>
                                            <span th:text="${user.email}"></span>
                                           
                                        </p>
                                        <p>
                                            <i class="fas fa-calendar-alt"></i>
                                           <span th:text="${#temporals.format(user.createdAt, 'dd/MM/yyyy HH:mm')}"></span>
                                        </p>
                                        <p>
                                            <i class="fas fa-wallet"></i>
                                            <span th:text="${user.accounts.size()}"></span>
                                        </p>
                                        
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                </div>
            </div>
        </div>
       
    </div>
</main>

<!-- Offcanvas Toggler -->
<button class="d2c_offcanvas_toggle position-fixed top-50 start-0 translate-middle-y d-block d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#d2c_sidebar">
    <i class="far fa-hand-point-right"></i>
</button>
<!-- End:Offcanvas Toggler -->

<!-- Initial  Javascript -->
<!-- Initial  Javascript -->
<script th:src="@{/lib/jQuery/jquery-3.5.1.min.js}"></script>
<script th:src="@{/lib/bootstrap_5/bootstrap.bundle.min.js}"></script>

<!-- custom js -->
<script th:src="@{/assets/js/main.js}"></script>
</body>
</html>
